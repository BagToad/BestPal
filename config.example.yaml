# Example configuration file for GamerPal
# Copy this to config.yaml and fill in your values

# Discord Bot Configuration
bot_token: "your-discord-bot-token-here"

# IGDB API Configuration
igdb_client_id: "your-igdb-client-id-here"
igdb_client_secret: "your-igdb-client-secret-here"
igdb_client_token: "your-igdb-client-token-here"

# For sort of random names in /say
crypto_salt: "something-random"

# Super admins. Replace with actual user IDs.
super_admins:
  - "user_id_1"

# GamerPals server configuration
gamerpals_server_id: "your-server-id-here"
gamerpals_mod_action_log_channel_id: "your-mod-log-channel-id-here"
gamerpals_pairing_category_id: "your-pairing-category-id-here"
gamerpals_introductions_forum_channel_id: "your-introductions-forum-channel-id-here"
gamerpals_lfg_forum_channel_id: "your-lfg-forum-channel-id-here"

# Event Feed Configuration
# When a new scheduled event is created, it is forwarded to this channel
event_feed_channel_id: "your-event-feed-channel-id-here"

# Introduction Feed Configuration
# When a new intro is posted, it can be forwarded to a dedicated channel
intro_feed_channel_id: "your-intro-feed-channel-id-here"
# Hours between allowed feed posts per user (prevents spam from delete+repost)
intro_feed_rate_limit_hours: 48

# Translate Command Configuration
# Controls which language style the "Translate" context menu command uses.
# Options: "caveman", "gen_alpha", "old_man", "80s", "high_society", "random"
# "random" will pick a random language each time.
translate_language: "random"

# 1984 Module - message activity logging
# Channel where every message create/edit/delete and reaction add/remove is logged.
# Leave empty to disable the module.
gamerpals_1984_log_channel_id: ""

# Voice Channel Permission Sync
# When @everyone Connect is denied on voice channels in this category,
# also deny View Channel (and vice versa for allowing)
gamerpals_voice_sync_category_id: "your-category-id-here"

# Logging
# When true, the bot only logs to stderr and skips writing rotating log files
# under log_dir. Intended for containerized deployments where stdout is captured
# by the host platform (e.g. Azure Container Apps -> Log Analytics).
# Can also be set via GAMERPAL_DISABLE_FILE_LOGGING=true.
disable_file_logging: false
