name: Deploy to Development

# Triggered when the `deploy-dev` label is applied to a pull request, or
# manually via the Actions UI / `gh workflow run` for testing.
#
# Builds the container image from the PR head (or dispatched ref),
# pushes it to ghcr.io/<owner>/bestpal:dev, and rolls out the dev
# Container App.

on:
  pull_request_target:
    types: [labeled]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'deploy-dev')
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/_deploy-aca.yml
    with:
      environment: dev
      image_tag: dev
      ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}
    secrets: inherit

  post-deploy:
    needs: deploy
    if: >-
      always() &&
      github.event_name == 'pull_request_target' &&
      github.event.label.name == 'deploy-dev'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Remove deploy-dev label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --remove-label "deploy-dev" || echo "Failed to remove label!"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            EMOJI="✅"
            MESSAGE="succeeded"
          else
            EMOJI="❌"
            MESSAGE="failed"
          fi

          COMMENT="${EMOJI} Development deployment to Azure Container Apps ${MESSAGE}.

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Give the container a moment to pull the new image and start, then refresh your Discord client if you see an invalid integration ID message."

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT" || echo "Failed to post PR comment"
