name: Deploy to Development

# Triggered when the `deploy-dev` label is applied to a pull request, or
# manually via the Actions UI / `gh workflow run` for testing.
#
# Builds the container image from the PR head (or dispatched ref),
# pushes it to ghcr.io/<owner>/bestpal:dev, and rolls out the dev
# Container App.

on:
  pull_request_target:
    types: [labeled]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push, and deploy
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'deploy-dev')
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      # SECURITY-CRITICAL: trust boundary.
      #
      # This checkout MUST NOT pass `ref:`. On pull_request_target the
      # default is the base SHA, which is trusted code. The next step
      # (uses: ./.github/actions/deploy-aca) loads action.yml from the
      # tree this checkout produces; if a PR-head checkout happened here
      # first, the malicious PR's action.yml would run with this job's
      # full privileges (id-token: write, packages: write).
      #
      # The composite action itself re-checks out at the PR head SHA
      # internally, only for the build step.
      - name: Checkout (action loader)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Deploy to Azure Container Apps
        uses: ./.github/actions/deploy-aca
        with:
          image-tag: dev
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aca-resource-group: ${{ vars.ACA_RESOURCE_GROUP }}
          aca-app-name: ${{ vars.ACA_APP_NAME }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  post-deploy:
    needs: deploy
    if: >-
      always() &&
      github.event_name == 'pull_request_target' &&
      github.event.label.name == 'deploy-dev'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Remove deploy-dev label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --remove-label "deploy-dev" || echo "Failed to remove label!"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            EMOJI="✅"
            MESSAGE="succeeded"
          else
            EMOJI="❌"
            MESSAGE="failed"
          fi

          COMMENT="${EMOJI} Development deployment to Azure Container Apps ${MESSAGE}.

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          Give the container a moment to pull the new image and start, then refresh your Discord client if you see an invalid integration ID message."

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$COMMENT" || echo "Failed to post PR comment"
