name: Deploy to Production

# Triggered on pushes to main that touch code, container, or workflow files.
# Builds the container image, pushes it to ghcr.io/<owner>/bestpal:prod,
# and rolls out the production Container App.

on:
  push:
    branches:
      - main
    paths:
      # Include any source-tree path that affects the built binary or container,
      # not just *.go, so embedded assets (//go:embed *.gif etc.) also trigger.
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy*.yml"
      - ".github/actions/deploy-aca/**"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout (action loader)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy to Azure Container Apps
        uses: ./.github/actions/deploy-aca
        with:
          image-tag: prod
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          aca-resource-group: ${{ vars.ACA_RESOURCE_GROUP }}
          aca-app-name: ${{ vars.ACA_APP_NAME }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
