name: Reusable Deploy to Azure Container Apps

# Reusable workflow that builds the container image, pushes it to ghcr.io,
# and updates the target Azure Container App with the new image.
#
# Container App secrets (bot token, IGDB credentials, etc.) are managed
# out-of-band via `az containerapp secret set` and are not touched here.

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment name (e.g. dev, production). Provides AZURE_* / ACA_* variables."
        required: true
        type: string
      image_tag:
        description: "ghcr.io tag to push and deploy (e.g. dev, prod)."
        required: true
        type: string
      ref:
        description: "Git ref / SHA to check out and build. Defaults to github.sha (the caller's pushed commit). Callers triggered by pull_request_target should pass the PR head SHA."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}
          # Do not leave the GITHUB_TOKEN in .git/config. For pull_request_target
          # callers building untrusted PR head code, this prevents a malicious PR
          # from exfiltrating the token via the docker build context.
          persist-credentials: false

      - name: Compute image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          # ghcr / docker registry names must be lowercase.
          echo "name=ghcr.io/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/bestpal" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.img.outputs.name }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        env:
          BUILD_SHA: ${{ inputs.ref != '' && inputs.ref || github.sha }}
          IMAGE: ${{ steps.img.outputs.name }}:${{ inputs.image_tag }}
        run: |
          # --revision-suffix forces a new revision even when the image tag
          # string is unchanged (mutable :dev / :prod tags pointing at a new
          # digest would otherwise be a no-op).
          SUFFIX="sha-${BUILD_SHA:0:7}-$(date -u +%y%m%d%H%M%S)"
          az containerapp update \
            --name "${{ vars.ACA_APP_NAME }}" \
            --resource-group "${{ vars.ACA_RESOURCE_GROUP }}" \
            --image "$IMAGE" \
            --revision-suffix "$SUFFIX" \
            --output none
          echo "Updated ${{ vars.ACA_APP_NAME }} in ${{ vars.ACA_RESOURCE_GROUP }} to $IMAGE (revision suffix: $SUFFIX)"

      - name: Show latest revision
        run: |
          az containerapp revision list \
            --name "${{ vars.ACA_APP_NAME }}" \
            --resource-group "${{ vars.ACA_RESOURCE_GROUP }}" \
            --query "[?properties.active].{name:name, created:properties.createdTime, replicas:properties.replicas, image:properties.template.containers[0].image}" \
            -o table
