name: Deploy to Production

# Triggered on pushes to main that touch code, container, or workflow files.
# Builds the container image, pushes it to ghcr.io/<owner>/bestpal:prod,
# and rolls out the production Container App.

on:
  push:
    branches:
      - main
    paths:
      # Include any source-tree path that affects the built binary or container,
      # not just *.go, so embedded assets (//go:embed *.gif etc.) also trigger.
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy*.yml"
      - ".github/workflows/_deploy-aca.yml"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-aca.yml
    with:
      environment: production
      image_tag: prod
    secrets: inherit
